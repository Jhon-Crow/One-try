name: Build Portable Windows EXE

on:
  push:
    branches: [ main, "issue-*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GODOT_VERSION: "4.3"
  PROJECT_NAME: OneTry
  EXPORT_PRESET: "Windows Desktop"

jobs:
  # ---------------------------------------------------------------------
  # build: exports the Godot 4 project to StandaloneWindows64 from a
  # Linux runner. No license or credentials required — Godot is free and
  # open-source. Export templates are downloaded automatically.
  # ---------------------------------------------------------------------
  build:
    name: Package Windows Portable EXE (Godot ${{ env.GODOT_VERSION }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot ${{ env.GODOT_VERSION }} headless
        run: |
          GODOT_FILENAME="Godot_v${GODOT_VERSION}-stable_linux.x86_64"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_FILENAME}.zip"
          wget -q "$GODOT_URL" -O godot.zip
          unzip -q godot.zip
          mkdir -p ~/.local/share/godot
          mv "$GODOT_FILENAME" ~/.local/share/godot/godot
          chmod +x ~/.local/share/godot/godot
          echo "PATH=$HOME/.local/share/godot:$PATH" >> "$GITHUB_ENV"

      - name: Install Godot Windows export templates
        run: |
          TEMPLATES_FILENAME="Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${TEMPLATES_FILENAME}"
          wget -q "$TEMPLATES_URL" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -q templates.tpz -d /tmp/godot_templates
          mv /tmp/godot_templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Import project (generate .godot cache)
        run: |
          godot --headless --import --quit 2>&1 || true

      - name: Export Windows EXE
        run: |
          mkdir -p builds
          godot --headless --export-release "${{ env.EXPORT_PRESET }}" builds/${{ env.PROJECT_NAME }}.exe 2>&1

      - name: List exported output
        if: always()
        run: |
          echo "Contents of builds/:"
          find builds -maxdepth 2 -type f | head -50 || echo "builds/ not found or empty"

      - name: Create portable ZIP archive
        if: success()
        run: |
          cd builds
          zip -r "../${{ env.PROJECT_NAME }}-Win64.zip" . -x "*.pdb" "*.debug"

      - name: Upload portable EXE artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-Win64-${{ github.run_number }}
          path: ${{ env.PROJECT_NAME }}-Win64.zip
          retention-days: 30
          if-no-files-found: error
