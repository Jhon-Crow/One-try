ssh_remote_deploy/run_script="#!/usr/bin/env bash\nexport DISPLAY=:0\nexport PULSE_SERVER=tcp:127.0.0.1\ncd \"{temp_dir}\"\nunzip -o \"{zip_name}\"\n\"{exe_name}\" {cmd_args}"
ssh_remote_deploy/cleanup_script="#!/usr/bin/env bash\nkill $(pgrep -x -f \"{exe_name} {cmd_args}\")\nrm -rf \"{temp_dir}\""
